<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Europese Hoofdsteden Quiz</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-2: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --good: #22c55e;
      --bad: #ef4444;
      --border: #475569;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: var(--panel);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border);
    }

    h1 {
      margin: 0 0 0.25rem 0;
      font-size: 1.6rem;
      text-align: center;
    }

    .subtitle {
      color: var(--muted);
      text-align: center;
      margin: 0 0 1.5rem 0;
      font-size: 0.95rem;
    }

    .progress {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .progress-bar {
      height: 6px;
      background: var(--panel-2);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0;
      transition: width 0.3s ease;
    }

    .flag-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .flag {
      width: 200px;
      height: 130px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      background: var(--panel-2);
    }

    .country {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 600;
      margin: 0.5rem 0 1.5rem 0;
    }

    .options {
      display: grid;
      gap: 0.6rem;
    }

    .option {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      font-size: 1rem;
      cursor: pointer;
      text-align: left;
      transition: transform 0.1s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .option:hover:not(:disabled) {
      background: #475569;
      transform: translateY(-1px);
    }

    .option:disabled { cursor: default; }

    .option.correct {
      background: rgba(34, 197, 94, 0.2);
      border-color: var(--good);
      color: #bbf7d0;
    }

    .option.wrong {
      background: rgba(239, 68, 68, 0.2);
      border-color: var(--bad);
      color: #fecaca;
    }

    .feedback {
      text-align: center;
      min-height: 1.5rem;
      margin-top: 1rem;
      font-weight: 500;
    }

    .next-btn, .restart-btn {
      width: 100%;
      margin-top: 1rem;
      padding: 0.85rem;
      background: var(--accent);
      color: #0f172a;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .next-btn:hover, .restart-btn:hover { opacity: 0.9; }

    .results {
      text-align: center;
    }

    .results h2 {
      margin: 0 0 0.5rem 0;
      font-size: 1.8rem;
    }

    .results .score {
      font-size: 3rem;
      font-weight: 700;
      color: var(--accent);
      margin: 0.5rem 0;
    }

    .results p {
      color: var(--muted);
      margin: 0 0 1rem 0;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Europese Hoofdsteden</h1>
    <p class="subtitle">Wat is de hoofdstad van dit land?</p>

    <div id="quiz">
      <div class="progress">
        <span id="progress-text">Vraag 1 van 1</span>
        <span id="score-text">Score: 0</span>
      </div>
      <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>

      <div class="flag-wrap">
        <img id="flag" class="flag" alt="vlag" />
      </div>
      <div id="country" class="country"></div>

      <div id="options" class="options"></div>
      <div id="feedback" class="feedback"></div>
      <button id="next-btn" class="next-btn hidden">Volgende</button>
    </div>

    <div id="results" class="results hidden">
      <h2>Klaar!</h2>
      <div class="score"><span id="final-score">0</span>/<span id="total">0</span></div>
      <p id="result-message"></p>
      <button id="restart-btn" class="restart-btn">Opnieuw spelen</button>
    </div>
  </main>

  <script>
    const COUNTRIES = [
      { country: "Albanië", capital: "Tirana", code: "al" },
      { country: "Andorra", capital: "Andorra la Vella", code: "ad" },
      { country: "Oostenrijk", capital: "Wenen", code: "at" },
      { country: "Wit-Rusland", capital: "Minsk", code: "by" },
      { country: "België", capital: "Brussel", code: "be" },
      { country: "Bosnië en Herzegovina", capital: "Sarajevo", code: "ba" },
      { country: "Bulgarije", capital: "Sofia", code: "bg" },
      { country: "Kroatië", capital: "Zagreb", code: "hr" },
      { country: "Cyprus", capital: "Nicosia", code: "cy" },
      { country: "Tsjechië", capital: "Praag", code: "cz" },
      { country: "Denemarken", capital: "Kopenhagen", code: "dk" },
      { country: "Estland", capital: "Tallinn", code: "ee" },
      { country: "Finland", capital: "Helsinki", code: "fi" },
      { country: "Frankrijk", capital: "Parijs", code: "fr" },
      { country: "Duitsland", capital: "Berlijn", code: "de" },
      { country: "Griekenland", capital: "Athene", code: "gr" },
      { country: "Hongarije", capital: "Boedapest", code: "hu" },
      { country: "IJsland", capital: "Reykjavik", code: "is" },
      { country: "Ierland", capital: "Dublin", code: "ie" },
      { country: "Italië", capital: "Rome", code: "it" },
      { country: "Kosovo", capital: "Pristina", code: "xk" },
      { country: "Letland", capital: "Riga", code: "lv" },
      { country: "Liechtenstein", capital: "Vaduz", code: "li" },
      { country: "Litouwen", capital: "Vilnius", code: "lt" },
      { country: "Luxemburg", capital: "Luxemburg", code: "lu" },
      { country: "Malta", capital: "Valletta", code: "mt" },
      { country: "Moldavië", capital: "Chisinau", code: "md" },
      { country: "Monaco", capital: "Monaco", code: "mc" },
      { country: "Montenegro", capital: "Podgorica", code: "me" },
      { country: "Nederland", capital: "Amsterdam", code: "nl" },
      { country: "Noord-Macedonië", capital: "Skopje", code: "mk" },
      { country: "Noorwegen", capital: "Oslo", code: "no" },
      { country: "Polen", capital: "Warschau", code: "pl" },
      { country: "Portugal", capital: "Lissabon", code: "pt" },
      { country: "Roemenië", capital: "Boekarest", code: "ro" },
      { country: "Rusland", capital: "Moskou", code: "ru" },
      { country: "San Marino", capital: "San Marino", code: "sm" },
      { country: "Servië", capital: "Belgrado", code: "rs" },
      { country: "Slowakije", capital: "Bratislava", code: "sk" },
      { country: "Slovenië", capital: "Ljubljana", code: "si" },
      { country: "Spanje", capital: "Madrid", code: "es" },
      { country: "Zweden", capital: "Stockholm", code: "se" },
      { country: "Zwitserland", capital: "Bern", code: "ch" },
      { country: "Turkije", capital: "Ankara", code: "tr" },
      { country: "Oekraïne", capital: "Kyiv", code: "ua" },
      { country: "Verenigd Koninkrijk", capital: "Londen", code: "gb" },
      { country: "Vaticaanstad", capital: "Vaticaanstad", code: "va" }
    ];

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    const flagEl = document.getElementById("flag");
    const countryEl = document.getElementById("country");
    const optionsEl = document.getElementById("options");
    const feedbackEl = document.getElementById("feedback");
    const nextBtn = document.getElementById("next-btn");
    const progressText = document.getElementById("progress-text");
    const progressFill = document.getElementById("progress-fill");
    const scoreText = document.getElementById("score-text");
    const quizEl = document.getElementById("quiz");
    const resultsEl = document.getElementById("results");
    const finalScoreEl = document.getElementById("final-score");
    const totalEl = document.getElementById("total");
    const resultMessage = document.getElementById("result-message");
    const restartBtn = document.getElementById("restart-btn");

    let order = [];
    let currentIndex = 0;
    let score = 0;

    function startQuiz() {
      order = shuffle(COUNTRIES);
      currentIndex = 0;
      score = 0;
      quizEl.classList.remove("hidden");
      resultsEl.classList.add("hidden");
      renderQuestion();
    }

    function renderQuestion() {
      const current = order[currentIndex];
      progressText.textContent = `Vraag ${currentIndex + 1} van ${order.length}`;
      scoreText.textContent = `Score: ${score}`;
      progressFill.style.width = `${(currentIndex / order.length) * 100}%`;

      flagEl.src = `https://flagcdn.com/w320/${current.code}.png`;
      flagEl.alt = `Vlag van ${current.country}`;
      countryEl.textContent = current.country;

      const others = COUNTRIES.filter((c) => c.capital !== current.capital);
      const distractors = shuffle(others).slice(0, 3).map((c) => c.capital);
      const choices = shuffle([current.capital, ...distractors]);

      optionsEl.innerHTML = "";
      choices.forEach((choice) => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.textContent = choice;
        btn.addEventListener("click", () => handleAnswer(btn, choice, current.capital));
        optionsEl.appendChild(btn);
      });

      feedbackEl.textContent = "";
      nextBtn.classList.add("hidden");
    }

    function handleAnswer(btn, choice, correct) {
      const buttons = optionsEl.querySelectorAll("button");
      buttons.forEach((b) => {
        b.disabled = true;
        if (b.textContent === correct) b.classList.add("correct");
      });

      if (choice === correct) {
        score++;
        feedbackEl.textContent = "Goed!";
        feedbackEl.style.color = "var(--good)";
      } else {
        btn.classList.add("wrong");
        feedbackEl.textContent = `Fout. Het juiste antwoord is ${correct}.`;
        feedbackEl.style.color = "var(--bad)";
      }

      scoreText.textContent = `Score: ${score}`;
      nextBtn.classList.remove("hidden");
    }

    nextBtn.addEventListener("click", () => {
      currentIndex++;
      if (currentIndex >= order.length) {
        showResults();
      } else {
        renderQuestion();
      }
    });

    function showResults() {
      quizEl.classList.add("hidden");
      resultsEl.classList.remove("hidden");
      finalScoreEl.textContent = score;
      totalEl.textContent = order.length;
      const pct = score / order.length;
      let msg;
      if (pct === 1) msg = "Perfect! Je kent alle hoofdsteden!";
      else if (pct >= 0.8) msg = "Uitstekend!";
      else if (pct >= 0.5) msg = "Goed bezig!";
      else msg = "Oefening baart kunst.";
      resultMessage.textContent = msg;
    }

    restartBtn.addEventListener("click", startQuiz);

    startQuiz();
  </script>
</body>
</html>
